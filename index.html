<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learnwell — Coming Soon</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @import url("https://use.typekit.net/nzx3kfk.css");
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --blue: #2556E8; --blue-dark: #0D2D6B; --orange: #F5A31A; }
    body {
      font-family: "acumin-pro", "Helvetica Neue", Arial, sans-serif;
      background: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,86,232,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,86,232,0.05) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    body::after {
      content: ""; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at center, rgba(37,86,232,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    main {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      animation: up 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .logo { width: 220px; margin-bottom: 48px; }
    .divider { width: 36px; height: 3px; background: var(--orange); border-radius: 2px; margin-bottom: 24px; }
    h1 {
      font-weight: 700; font-size: clamp(2.8rem, 8vw, 5.5rem);
      color: var(--blue-dark); letter-spacing: -0.02em; line-height: 1;
    }
    h1 span.blue { color: var(--blue); }
    h1 span.dot {
      display: inline-block; width: 0.16em; height: 0.16em;
      background: var(--orange); border-radius: 50%;
      vertical-align: super; margin-left: 0.05em; position: relative; top: 0.1em;
    }
  </style>
</head>
<body>
  <main>
    <img src="Learnwell_Logo.png" class="logo" alt="Learnwell" />
    <div class="divider"></div>
    <h1><span class="blue">Coming</span> soon<span class="dot"></span></h1>
  </main>
</body>
</html>
