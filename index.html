<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnWell Courses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: #1e293b;
      border-radius: 1.5rem;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      background: #6366f1;
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>LearnWell Courses</h1>
    <p>Site coming soon — this page confirms GitHub Pages is working.</p>
    <span class="badge">🚀 Live on GitHub Pages</span>
  </div>
</body>
</html>
