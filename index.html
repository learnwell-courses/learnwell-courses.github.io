<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learnwell — Coming Soon</title>
  <style>
    @import url("https://use.typekit.net/nzx3kfk.css");

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue:       #1B6FD8;
      --blue-dark:  #0D2D6B;
      --orange:     #F5A31A;
      --white:      #ffffff;
      --off-white:  #f4f7fc;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "acumin-pro", "Helvetica Neue", Arial, sans-serif;
      background: var(--white);
      color: var(--blue-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(27,111,216,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27,111,216,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Soft radial glow behind content */
    body::after {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center,
        rgba(27,111,216,0.08) 0%,
        rgba(245,163,26,0.04) 50%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      margin-bottom: 56px;
    }

    .logo-wrap img {
      width: 260px;
      height: auto;
      display: block;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: var(--orange);
      border-radius: 2px;
      margin-bottom: 28px;
      animation: fadeUp 0.9s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 {
      font-family: "acumin-pro", "Helvetica Neue", Arial, sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: -0.02em;
      color: var(--blue-dark);
      line-height: 1;
      animation: fadeUp 0.9s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 span {
      color: var(--blue);
    }

    /* Floating dot accent — mirrors the logomark */
    .dot {
      display: inline-block;
      width: 0.18em;
      height: 0.18em;
      background: var(--orange);
      border-radius: 50%;
      vertical-align: super;
      margin-left: 0.06em;
      position: relative;
      top: 0.12em;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-wrap">
      <img src="Learnwell_Logo.png" alt="Learnwell" />
    </div>
    <div class="divider"></div>
    <h1><span>Coming</span> soon<span class="dot"></span></h1>
  </main>
</body>
</html>
